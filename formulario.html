<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registro EHS — Planta Tornquist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cat-color:#047857;
    --brand-50:#ECFDF5; --brand-100:#D1FAE5; --brand-200:#A7F3D0;
    --brand-500:#10B981; --brand-600:#059669; --brand-700:#047857; --brand-800:#065F46;
    --bg:#F8FAFC; --bg2:#FFFFFF; --bg3:#F1F5F9;
    --border:#E2E8F0; --border-strong:#CBD5E1;
    --t1:#0F172A; --t2:#475569; --t3:#94A3B8;
    --accident:#DC2626; --accident-bg:#FEF2F2; --accident-border:#FECACA;
    --incident:#F59E0B; --incident-bg:#FFFBEB; --incident-border:#FDE68A;
    --environment:#059669; --environment-bg:#ECFDF5; --environment-border:#A7F3D0;
    --shadow-xs:0 1px 2px rgba(15,23,42,.04);
    --shadow-sm:0 1px 3px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
    --shadow-md:0 4px 6px rgba(15,23,42,.05), 0 2px 4px rgba(15,23,42,.04);
    --shadow-lg:0 10px 25px rgba(15,23,42,.08), 0 4px 10px rgba(15,23,42,.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter Tight',system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--t1); min-height:100vh;
    letter-spacing:-.01em;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%, var(--brand-50) 0%, transparent 55%),
      linear-gradient(180deg, #FFFFFF 0%, var(--bg) 100%);
    background-attachment:fixed;
  }
  .app { max-width:520px; margin:0 auto; padding:20px 16px 40px; }

  /* Header */
  .header {
    background:linear-gradient(135deg, var(--cat-color), color-mix(in srgb, var(--cat-color) 75%, #000));
    border-radius:18px; padding:18px 20px; margin-bottom:18px;
    box-shadow:0 10px 30px color-mix(in srgb, var(--cat-color) 20%, transparent);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .header-inner h1 { font-size:17px; font-weight:700; color:#fff; letter-spacing:-.02em; display:flex; align-items:center; gap:10px; }
  .header-inner h1 svg { width:20px; height:20px; }
  .header-inner p { font-size:12px; color:rgba(255,255,255,.8); margin-top:3px; font-weight:500; }
  .home-btn {
    flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:10px;
    background:rgba(255,255,255,.18); color:#fff; text-decoration:none;
    transition:all .2s ease-out; border:1px solid rgba(255,255,255,.18);
  }
  .home-btn:hover { background:rgba(255,255,255,.28); transform:translateY(-1px); }
  .home-btn svg { width:18px; height:18px; }

  /* Steps progress */
  .steps {
    display:flex; align-items:center; justify-content:center; gap:6px;
    margin-bottom:10px; padding:14px; background:var(--bg2);
    border:1px solid var(--border); border-radius:14px;
    box-shadow:var(--shadow-xs);
  }
  .step-dot {
    width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; font-family:'JetBrains Mono',monospace;
    transition:all .35s cubic-bezier(.4,0,.2,1);
  }
  .step-dot.done { background:var(--cat-color); color:#fff; }
  .step-dot.active { background:var(--cat-color); color:#fff; transform:scale(1.12); box-shadow:0 0 0 4px color-mix(in srgb, var(--cat-color) 20%, transparent); }
  .step-dot.pending { background:var(--bg3); color:var(--t3); border:1px solid var(--border); }
  .step-line { width:18px; height:2px; background:var(--border); border-radius:2px; transition:all .35s; }
  .step-line.done { background:var(--cat-color); }
  .step-title { text-align:center; font-size:11px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.15em; margin-bottom:18px; font-family:'JetBrains Mono',monospace; }

  /* Sections */
  .section { margin-bottom:22px; }
  .section-title {
    font-size:14px; font-weight:700; color:var(--t1); margin-bottom:12px;
    display:flex; align-items:center; gap:8px; letter-spacing:-.01em;
  }
  .section-title svg { width:16px; height:16px; }

  /* Chips (turno, epp, etc) */
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip {
    padding:10px 16px; border-radius:11px;
    border:1px solid var(--border);
    background:var(--bg2);
    color:var(--t2); font-size:13px; font-weight:600;
    cursor:pointer; transition:all .2s ease-out; user-select:none;
    font-family:'Inter Tight',sans-serif;
  }
  .chip:hover { border-color:var(--brand-500); color:var(--brand-700); background:var(--brand-50); }
  .chip.selected {
    color:#fff; border-color:var(--cat-color); background:var(--cat-color);
    box-shadow:0 4px 12px color-mix(in srgb, var(--cat-color) 30%, transparent);
  }

  /* Category cards */
  .cat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cat-card {
    padding:20px 12px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg2);
    text-align:center; cursor:pointer; transition:all .3s ease-out;
    box-shadow:var(--shadow-xs);
  }
  .cat-card:hover { border-color:var(--border-strong); transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .cat-card.selected { color:#fff; transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .cat-card .icon { font-size:30px; display:block; margin-bottom:8px; }
  .cat-card .label { font-weight:700; font-size:13px; letter-spacing:-.01em; }

  /* Priority cards */
  .pri-card, .opt-card {
    width:100%; padding:14px 16px; border-radius:12px;
    border:1px solid var(--border); background:var(--bg2);
    text-align:left; cursor:pointer; transition:all .2s ease-out;
    margin-bottom:8px; color:var(--t1);
    box-shadow:var(--shadow-xs);
  }
  .pri-card:hover, .opt-card:hover { border-color:var(--border-strong); transform:translateX(2px); }
  .pri-card.selected, .opt-card.selected { color:#fff; border-color:transparent; transform:translateX(2px); box-shadow:var(--shadow-md); }
  .pri-card .pri-label, .opt-card .opt-label { font-weight:700; font-size:14px; letter-spacing:-.01em; }
  .pri-card .pri-desc, .opt-card .opt-desc { font-size:12px; margin-top:3px; opacity:.8; line-height:1.4; color:var(--t2); }
  .pri-card.selected .pri-desc, .opt-card.selected .opt-desc { color:rgba(255,255,255,.85); opacity:1; }

  .pri-result {
    width:100%; padding:16px; border-radius:14px; text-align:center;
    font-weight:800; font-size:17px; color:#fff; margin-top:10px;
    letter-spacing:-.01em; box-shadow:var(--shadow-md);
  }

  /* Fields */
  .field { margin-bottom:14px; }
  .field label {
    display:block; font-size:11px; font-weight:700; color:var(--t2);
    margin-bottom:7px; text-transform:uppercase; letter-spacing:.1em;
    font-family:'JetBrains Mono',monospace;
  }
  .field label .req { color:var(--accident); margin-left:2px; }
  .field input, .field textarea {
    width:100%; background:var(--bg2); border:1px solid var(--border);
    border-radius:12px; padding:13px 16px; color:var(--t1);
    font-size:15px; font-family:'Inter Tight',sans-serif; outline:none;
    transition:all .2s ease-out;
  }
  .field input::placeholder, .field textarea::placeholder { color:var(--t3); }
  .field input:focus, .field textarea:focus {
    border-color:var(--cat-color);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--cat-color) 15%, transparent);
  }
  .field textarea { resize:none; min-height:88px; line-height:1.5; }

  /* Date/time picker — ícono verde destacado sobre fondo claro */
  .field input[type="date"], .field input[type="time"] {
    color-scheme:light; padding-right:50px; cursor:pointer;
  }
  .field input[type="date"]::-webkit-calendar-picker-indicator,
  .field input[type="time"]::-webkit-calendar-picker-indicator {
    opacity:1; cursor:pointer; width:22px; height:22px; padding:4px;
    background-color:var(--brand-100); border-radius:8px;
    margin-right:4px; transition:all .2s;
    filter:brightness(0.7) sepia(1) saturate(4) hue-rotate(110deg);
    animation:iconPulse 2.4s ease-in-out infinite;
  }
  .field input[type="date"]::-webkit-calendar-picker-indicator:hover,
  .field input[type="time"]::-webkit-calendar-picker-indicator:hover {
    background-color:var(--brand-200); transform:scale(1.15); animation:none;
  }
  @keyframes iconPulse {
    0%,100% { background-color:var(--brand-100); box-shadow:0 0 0 0 color-mix(in srgb, var(--brand-500) 35%, transparent); }
    50%     { background-color:var(--brand-200); box-shadow:0 0 0 4px color-mix(in srgb, var(--brand-500) 0%, transparent); }
  }

  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  /* Buttons */
  .nav { display:flex; gap:10px; margin-top:24px; }
  .btn {
    flex:1; padding:14px 20px; border-radius:12px;
    font-size:14px; font-weight:700; font-family:'Inter Tight',sans-serif;
    letter-spacing:-.01em; border:none; cursor:pointer;
    transition:all .2s ease-out; display:inline-flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-back {
    background:var(--bg2); color:var(--t2);
    border:1px solid var(--border);
  }
  .btn-back:hover { background:var(--bg3); border-color:var(--border-strong); }
  .btn-next {
    color:#fff; background:var(--cat-color);
    box-shadow:0 4px 12px color-mix(in srgb, var(--cat-color) 30%, transparent);
  }
  .btn-next:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 16px color-mix(in srgb, var(--cat-color) 40%, transparent); }
  .btn-next:disabled { background:var(--bg3); color:var(--t3); box-shadow:none; cursor:not-allowed; }
  .btn-submit {
    background:linear-gradient(135deg, var(--cat-color), color-mix(in srgb, var(--cat-color) 75%, #000));
    color:#fff; box-shadow:0 6px 20px color-mix(in srgb, var(--cat-color) 30%, transparent);
  }

  /* Review */
  .review-box {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; padding:16px 18px; margin-bottom:12px;
    box-shadow:var(--shadow-xs);
  }
  .review-row {
    display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
    padding:9px 0; border-bottom:1px solid var(--border);
  }
  .review-row:last-child { border-bottom:none; }
  .review-label {
    color:var(--t2); font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.08em; font-family:'JetBrains Mono',monospace;
  }
  .review-value { color:var(--t1); font-size:14px; font-weight:500; text-align:right; max-width:60%; }
  .review-center { text-align:center; padding:14px 0 8px; }
  .review-center .icon { font-size:42px; }
  .review-center h3 { font-size:19px; font-weight:700; color:var(--t1); margin-top:8px; letter-spacing:-.02em; }
  .review-center .sub { font-size:13px; color:var(--t2); margin-top:3px; }
  .review-badge {
    display:inline-block; margin-top:12px; padding:5px 18px;
    border-radius:999px; font-size:12px; font-weight:700; color:#fff;
    letter-spacing:.05em; font-family:'JetBrains Mono',monospace;
  }
  .detail-box {
    background:var(--bg2); border:1px solid var(--border);
    border-left:3px solid var(--t3);
    border-radius:12px; padding:12px 16px; margin-bottom:10px;
    box-shadow:var(--shadow-xs);
  }
  .detail-box .dt-label {
    font-size:10px; font-weight:700; color:var(--t2);
    margin-bottom:5px; text-transform:uppercase; letter-spacing:.12em;
    font-family:'JetBrains Mono',monospace;
  }
  .detail-box .dt-value { font-size:14px; color:var(--t1); line-height:1.55; white-space:pre-wrap; }
  .detail-box.orange { background:var(--incident-bg); border-color:var(--incident-border); border-left-color:var(--incident); }
  .detail-box.orange .dt-label { color:#B45309; }
  .detail-box.orange .dt-value { color:#78350F; }

  /* Success */
  .success { text-align:center; padding:56px 20px; }
  .success .icon-wrap {
    width:72px; height:72px; border-radius:50%; margin:0 auto 18px;
    background:linear-gradient(135deg, var(--brand-500), var(--brand-700));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px color-mix(in srgb, var(--brand-500) 35%, transparent);
    animation:successPop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes successPop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .success .icon-wrap svg { width:40px; height:40px; color:#fff; }
  .success h2 { font-size:22px; font-weight:800; color:var(--t1); margin-bottom:8px; letter-spacing:-.02em; }
  .success p { color:var(--t2); font-size:14px; margin-bottom:4px; line-height:1.55; }
  .success .id {
    display:inline-block; font-family:'JetBrains Mono',monospace;
    font-size:14px; font-weight:600; color:var(--brand-800);
    background:var(--brand-50); border:1px solid var(--brand-200);
    padding:8px 16px; border-radius:10px; margin:16px 0;
  }

  /* Sending */
  .sending { text-align:center; padding:72px 20px; }
  .sending .spinner {
    width:48px; height:48px; border:3px solid var(--border);
    border-top-color:var(--cat-color); border-radius:50%;
    animation:spin .8s linear infinite; margin:0 auto 18px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .hidden { display:none !important; }

  /* Welcome screen */
  .welcome {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 24px; text-align:center; position:relative;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--brand-100) 0%, transparent 55%),
      linear-gradient(180deg, #FFFFFF 0%, var(--bg) 100%);
  }
  .welcome > * { position:relative; z-index:1; }
  .welcome .shield-wrap {
    width:88px; height:88px; border-radius:22px; margin:0 auto 24px;
    background:linear-gradient(135deg, var(--brand-500), var(--brand-700));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 20px 50px color-mix(in srgb, var(--brand-500) 30%, transparent);
    animation:fadeIn .7s ease, float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .welcome .shield-wrap svg { width:44px; height:44px; color:#fff; }
  .welcome .eyebrow-w {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    color:var(--brand-700); letter-spacing:.2em; text-transform:uppercase;
    margin-bottom:14px; padding:7px 16px;
    background:var(--brand-50); border:1px solid var(--brand-200);
    border-radius:999px; animation:fadeIn .7s ease .1s both;
  }
  .welcome h1 {
    font-size:clamp(34px, 8vw, 46px); font-weight:800; color:var(--t1);
    letter-spacing:-.035em; margin-bottom:14px;
    line-height:1.05; animation:fadeIn .7s ease .2s both;
  }
  .welcome h1 .accent {
    background:linear-gradient(135deg, var(--brand-600), var(--brand-800));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .welcome .msg {
    font-size:15px; color:var(--t2); line-height:1.6;
    max-width:380px; margin-bottom:36px; animation:fadeIn .7s ease .3s both;
  }
  .welcome .start-btn {
    background:var(--brand-700); color:#fff; border:none;
    padding:16px 40px; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; letter-spacing:-.01em;
    display:inline-flex; align-items:center; gap:8px;
    animation:fadeIn .7s ease .4s both;
    transition:all .25s ease-out;
    box-shadow:0 10px 30px color-mix(in srgb, var(--brand-700) 35%, transparent);
    font-family:'Inter Tight',sans-serif;
  }
  .welcome .start-btn:hover { background:var(--brand-800); transform:translateY(-2px); box-shadow:0 16px 40px color-mix(in srgb, var(--brand-700) 45%, transparent); }
  .welcome .start-btn svg { width:16px; height:16px; transition:transform .2s; }
  .welcome .start-btn:hover svg { transform:translateX(3px); }
  .welcome .plant {
    font-size:12px; color:var(--t3); margin-top:20px;
    animation:fadeIn .7s ease .5s both;
    font-family:'JetBrains Mono',monospace; letter-spacing:.05em;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>


<script src="personal.js"></script>
<script>
// =============================================
// ⚠️ PEGAR TU URL DE APPS SCRIPT ACÁ:
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPVE8sjKNoGgCcQAyqozGMsmg0ygNWahjUOigXr6CWcypygFEKHkMvgGikgmwwxiQX/exec";

var SECTORS = ["Pulper","Planta de Pasta","Mesas-Prensas","Secado","Estucado","Pope-Sexta","Caldera","Efluente Primario - Hidropolis","Efluente Secundario","Laboratorio","Cellier","Rebobinadora","Alistado","Cortadora - exCarpintería","Despacho","MP Fibrosa","MP Cellier","MP Químicos","Sector Camiones","Taller Eléctrico","Taller Icopro","Taller Mecánico","Intendencia","Administración/oficinas"];
var SHIFTS = ["A","B","C","D","Diurno"];
var BODY_PARTS = ["Cabeza","Ojos","Cara","Cuello","Hombro","Brazo","Mano","Dedos","Tronco","Espalda","Cadera","Pierna","Rodilla","Pie","Múltiples"];
var EPP_LIST = ["Casco","Anteojos","Protección auditiva","Guantes","Calzado de seguridad","Protección respiratoria","Arnés","Ropa ignífuga","Otro"];

var CATEGORIES = {
  ACCIDENTE: {
    label:"Accidente", icon:"🔴", color:"#DC2626",
    subTypes:["Traslado a centro médico externo","Atención médica en planta","Primeros auxilios en planta"],
    consequences:[

      {value:"continua",label:"Continúa con su actividad normalmente",priority:"MEDIA"}

  INCIDENTE: {

    subTypes:["Condición insegura","Acto inseguro"],

    actosInseguros:["Operar equipos sin autorización o a velocidades peligrosas","No utilizar equipos de protección personal (EPP)","Distracciones, fatiga o exceso de confianza","Uso inadecuado de herramientas o maquinaria","Eliminar dispositivos de seguridad"],
    condicionesInseguras:["Superficies resbaladizas, irregulares o sucias","Equipos, maquinaria o herramientas defectuosas","Iluminación, ventilación o ruido inadecuados","Falta de orden y limpieza en el área de trabajo","Falta de señalización de seguridad"]

  MEDIO_AMBIENTE: {

    consequences:["Impacto contenido internamente","Impacto fuera de planta","Daño ambiental significativo","Impacto grave"],
    priorities:[
      {value:"CRITICA",label:"Crítica",color:"#DC2626",desc:"Impacto fuera de planta, notificación a autoridad"},
      {value:"ALTA",label:"Alta",color:"#EA580C",desc:"Daño ambiental significativo, contención compleja"},
      {value:"MEDIA",label:"Media",color:"#CA8A04",desc:"Impacto contenido, requiere acción correctiva"},
      {value:"BAJA",label:"Baja",color:"#16A34A",desc:"Evento menor, contenido rápidamente"}

var state = { step:0, form:{}, counter:0, sending:false, success:false, successId:"", showWelcome:true };

function getSteps() {
  var c = state.form.eventCategory;
  if (!c) return ["Tipo de Evento"];
  if (c==="ACCIDENTE") return ["Tipo de Evento","Consecuencia y Prioridad","Datos del Evento","Persona y EPP","Descripción y Acciones","Revisión"];
  if (c==="INCIDENTE") return ["Tipo de Evento","Prioridad","Datos del Evento","Detalles","Descripción y Acciones","Revisión"];
  return ["Tipo de Evento","Consecuencia y Prioridad","Datos del Evento","Detalles Ambientales","Contención y Acciones","Revisión"];
}

function getCat() { return state.form.eventCategory ? CATEGORIES[state.form.eventCategory] : null; }
function getColor() { var c=getCat(); return c?c.color:"#3B82F6"; }

function setField(k,v) { state.form[k]=v; render(); }
function toggleMulti(k,v) {
  var arr=state.form[k]||[];
  var idx=arr.indexOf(v);
  if(idx>=0) arr.splice(idx,1); else arr.push(v);
  state.form[k]=[...arr];
  render();
}

function canNext() {
  var s=state.step, f=state.form;
  if(s===0) return !!f.eventCategory && !!f.eventSubType;
  if(s===1) {
    if(f.eventCategory==="INCIDENTE") return !!f.priority;
    return !!f.consequence && !!f.priority;
  }
  if(s===2) return !!f.date && !!f.shift && !!f.sector;
  if(s===4) {
    // Descripción obligatoria en ACCIDENTE e INCIDENTE
    if(f.eventCategory==="ACCIDENTE") return !!(f.description && f.description.trim().length>0);
    if(f.eventCategory==="INCIDENTE") return !!(f.description && f.description.trim().length>0);
  }
  return true;
}

// Autocompletado persona <-> legajo (convenio)
function onPersonChange(v) {
  state.form.person = v;
  var key = (v||"").trim().toUpperCase();
  if (typeof PERSONAL_BY_NOMBRE !== "undefined" && PERSONAL_BY_NOMBRE[key]) {
    state.form.personId = String(PERSONAL_BY_NOMBRE[key]);
  }
  render();
}
function onLegajoChange(v) {
  state.form.personId = v;
  var key = String((v||"").trim());
  if (typeof PERSONAL_BY_LEGAJO !== "undefined" && PERSONAL_BY_LEGAJO[key]) {
    state.form.person = PERSONAL_BY_LEGAJO[key];
  }
  render();
}

function nextStep() { if(canNext()) { state.step++; render(); window.scrollTo(0,0); } }
function prevStep() { if(state.step>0) { state.step--; render(); window.scrollTo(0,0); } }

function generateId() {
  var p = state.form.eventCategory==="ACCIDENTE"?"ACC":state.form.eventCategory==="INCIDENTE"?"INC":"MA";
  var now = new Date();
  var pad = function(n){ return String(n).padStart(2,"0"); };
  var ts = String(now.getFullYear()).slice(-2) + pad(now.getMonth()+1) + pad(now.getDate()) + "-" + pad(now.getHours()) + pad(now.getMinutes());
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sin I, O, 0, 1 para evitar confusión
  var rnd = "";
  for (var i=0; i<3; i++) rnd += chars.charAt(Math.floor(Math.random()*chars.length));
  return p + "-" + ts + "-" + rnd;
}

function submitForm() {
  state.sending=true;
  render();
  var f=state.form;
  var id=generateId();
  
  // Resolver labels
  var consequenceLabel = f.consequence;
  if(f.eventCategory==="ACCIDENTE" && getCat().consequences) {
    var found = getCat().consequences.find(function(c){return c.value===f.consequence;});
    if(found) consequenceLabel = found.label;
  }
  var accTypeLabel = "";
  if(f.accidentType && getCat().accidentTypes) {
    var at = getCat().accidentTypes.find(function(a){return a.id===f.accidentType;});
    if(at) accTypeLabel = at.label;
  }
  
  var params = new URLSearchParams();
  params.append("id",id);
  params.append("eventCategory",f.eventCategory||"");
  params.append("eventSubType",f.eventSubType||"");
  params.append("consequence",consequenceLabel||"");
  params.append("priority",f.priority||"");
  params.append("date",f.date||"");
  params.append("time",f.time||"");
  params.append("shift",f.shift||"");
  params.append("sector",f.sector||"");
  params.append("location",f.location||"");
  params.append("person",f.person||"");
  params.append("personId",f.personId||"");
  params.append("bodyPart",(f.bodyPart||[]).join(", "));
  params.append("epp",(f.epp||[]).join(", "));
  params.append("accidentType",accTypeLabel);
  params.append("description",f.description||"");
  params.append("task",f.task||"");
  params.append("incidentOption",f.incidentOption||"");
  params.append("immediateActions",f.immediateActions||"");
  params.append("areaNotified",f.areaNotified||"");
  params.append("areaNotifiedTo",f.areaNotifiedTo||"");
  params.append("artNotified",f.artNotified||"");
  params.append("substance",f.substance||"");
  params.append("estimatedVolume",f.estimatedVolume||"");
  params.append("areaAffected",f.areaAffected||"");
  params.append("authorityNotified",f.authorityNotified||"");
  params.append("containmentActions",f.containmentActions||"");
  params.append("rootCause",f.rootCause||"");
  params.append("corrActions",(f.corrActions||"").replace(/\n/g," | "));
  params.append("reportedBy",f.reportedBy||"");
  params.append("reporterRole",f.reporterRole||"");
  
  // Enviar via iframe hidden form
  var iframe = document.getElementById("submitFrame");
  if(!iframe) { iframe=document.createElement("iframe"); iframe.id="submitFrame"; iframe.name="submitFrame"; iframe.style.display="none"; document.body.appendChild(iframe); }
  
  var form = document.createElement("form");
  form.method="POST";
  form.action=APPS_SCRIPT_URL;
  form.target="submitFrame";
  
  for(var pair of params.entries()) {
    var input=document.createElement("input");
    input.type="hidden"; input.name=pair[0]; input.value=pair[1];
    form.appendChild(input);
  }
  
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
  
  setTimeout(function(){
    state.sending=false;
    state.success=true;
    state.successId=id;
    render();
  }, 2500);
}

function resetForm() {
  state.step=0; state.form={}; state.success=false; state.successId="";
  render();
}

// ============ RENDER ============

    return;
  }
  
  if(state.sending) {
    h='<div class="sending"><div class="spinner"></div><p style="color:var(--t3);font-size:14px;">Enviando registro...</p></div>';
    document.getElementById("app").innerHTML=h;

  }
  
  if(state.success) {
    h='<div class="success">'
      +'<div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
      +'<h2>Registro enviado</h2>'

    return;
  }
  
  // Header
  var grad = cat ? cat.color : "#10B981";
  h='<div class="header" style="background:linear-gradient(135deg,'+grad+',color-mix(in srgb,'+grad+' 70%,#000));box-shadow:0 8px 28px color-mix(in srgb,'+grad+' 25%,transparent);">'
    +'<div class="header-inner">'
    +'<h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Registro de Eventos EHS</h1>'
    +'<p>Planta Tornquist</p>'
    +'</div>'
    +'<a href="index.html" class="home-btn" title="Volver al inicio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>'
    +'</div>';
  
  // Steps
  h+='<div class="steps">';
  for(var i=0;i<steps.length;i++) {
    var cls=i<state.step?"done":i===state.step?"active":"pending";
    h+='<div class="step-dot '+cls+'">'+(i<state.step?"✓":(i+1))+'</div>';
    if(i<steps.length-1) h+='<div class="step-line '+(i<state.step?"done":"")+'"></div>';
  }
  h+='</div><div class="step-title">'+steps[state.step]+'</div>';
  
  // Content
  h+=renderCurrentStep();
  
  // Nav
  h+='<div class="nav">';

  if(state.step<steps.length-1) {
    h+='<button class="btn btn-next" onclick="nextStep()" '+(canNext()?"":' disabled')+'>Siguiente →</button>';
  } else {
    h+='<button class="btn btn-submit" onclick="submitForm()">✓ Registrar '+(cat?cat.label:"")+'</button>';

  h+='</div>';
  
  document.getElementById("app").innerHTML=h;
}

        +'<div class="field"><label>¿Qué pasó exactamente? <span class="req">*</span></label><textarea placeholder="Describa en detalle cómo ocurrió" onchange="setField(\'description\',this.value)">'+(f.description||"")+'</textarea></div>'
        +'<div class="field"><label>Tarea que se realizaba</label><input type="text" value="'+(f.task||"")+'" placeholder="¿Qué actividad se estaba ejecutando?" onchange="setField(\'task\',this.value)"></div></div>';
      h+='<div class="section"><div class="section-title" style="color:#EA580C;">🚨 Acción inmediata para evitar que se lesione alguien más</div>'
        +'<div class="field"><textarea placeholder="¿Qué se hizo para proteger a los demás?" onchange="setField(\'immediateActions\',this.value)">'+(f.immediateActions||"")+'</textarea></div></div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">📞 ¿Se notificó al responsable del área?</div><div class="chips">';
      ["Sí","No"].forEach(function(o){ var sel=f.areaNotified===o; var oc=o==="Sí"?"#16A34A":"#DC2626";
        h+='<div class="chip'+(sel?" selected":"")+'" style="'+(sel?"background:"+oc+";border-color:"+oc+";":"")+'" onclick="setField(\'areaNotified\',\''+(sel?"":o)+'\')">'+o+'</div>';
      });
      h+='</div>';
      if(f.areaNotified==="Sí") h+='<div class="field" style="margin-top:8px;"><label>¿A quién?</label><input type="text" value="'+(f.areaNotifiedTo||"")+'" placeholder="Nombre del responsable" onchange="setField(\'areaNotifiedTo\',this.value)"></div>';
      h+='</div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">🏥 ¿Se notificó a la ART / Seguro?</div><div class="chips">';
      ["Sí","No"].forEach(function(o){ var sel=f.artNotified===o; var oc=o==="Sí"?"#16A34A":"#DC2626";
        h+='<div class="chip'+(sel?" selected":"")+'" style="'+(sel?"background:"+oc+";border-color:"+oc+";":"")+'" onclick="setField(\'artNotified\',\''+(sel?"":o)+'\')">'+o+'</div>';
      });
      h+='</div></div>';
    } else if(f.eventCategory==="INCIDENTE") {
      var isActo=f.eventSubType==="Acto inseguro";
      var opts=isActo?cat.actosInseguros:cat.condicionesInseguras;
      var optTitle=isActo?"🚫 ¿Qué acto inseguro se identificó?":"⚠️ ¿Qué condición insegura se identificó?";
      h+='<div class="section"><div class="section-title" style="color:'+color+';">'+optTitle+'</div>';
      opts.forEach(function(o){ var sel=f.incidentOption===o;
        h+='<div class="opt-card'+(sel?" selected":"")+'" style="'+(sel?"background:"+color+";border-color:"+color+";":"")+'" onclick="setField(\'incidentOption\',\''+(sel?"":o).replace(/'/g,"\\'").replace(/\(/g,"\\(").replace(/\)/g,"\\)")+'\');">'
          +'<div class="opt-label">'+o+'</div></div>';
      });
      h+='</div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">📄 Descripción detallada</div>'
        +'<div class="field"><label>¿Qué pasó exactamente? <span class="req">*</span></label><textarea placeholder="Describa en detalle qué se observó (acto o condición insegura)" onchange="setField(\'description\',this.value)">'+(f.description||"")+'</textarea></div>'
        +'<div class="field"><label>Tarea que se realizaba</label><input type="text" value="'+(f.task||"")+'" placeholder="¿Qué actividad se estaba ejecutando?" onchange="setField(\'task\',this.value)"></div></div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">🚨 Acciones inmediatas</div>'
        +'<div class="field"><textarea placeholder="¿Qué se hizo inmediatamente?" onchange="setField(\'immediateActions\',this.value)">'+(f.immediateActions||"")+'</textarea></div></div>';
    } else {
      h+='<div class="section"><div class="section-title" style="color:'+color+';">📝 Descripción del evento</div>'
        +'<div class="field"><textarea placeholder="Describa en detalle el evento ambiental" onchange="setField(\'description\',this.value)">'+(f.description||"")+'</textarea></div></div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">🛡️ Acciones de contención</div>'
        +'<div class="field"><textarea placeholder="¿Qué se hizo para contener?" onchange="setField(\'containmentActions\',this.value)">'+(f.containmentActions||"")+'</textarea></div></div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">🔍 Causa raíz</div>'
        +'<div class="field"><textarea placeholder="¿Por qué ocurrió?" onchange="setField(\'rootCause\',this.value)">'+(f.rootCause||"")+'</textarea></div></div>';
      h+='<div class="section"><div class="section-title" style="color:'+color+';">✅ Acciones correctivas</div>'
        +'<div class="field"><label>Plan de acción (una por línea)</label><textarea placeholder="Acción 1&#10;Acción 2" onchange="setField(\'corrActions\',this.value)">'+(f.corrActions||"")+'</textarea></div></div>';
    }
    return h;
  }
  
  // STEP 5 - Revisión
  if(s===5) {
    var pri=cat.priorities.find(function(p){return p.value===f.priority;});
    h+='<div class="review-center"><div class="icon">'+cat.icon+'</div><h3>'+cat.label+'</h3><div class="sub">'+f.eventSubType+'</div>'
      +'<div class="review-badge" style="background:'+(pri?pri.color:"#6B7280")+';">'+(f.priority||"")+'</div></div>';
    
    h+='<div class="review-box">';
    h+=reviewRow("Fecha / Hora",(f.date||"—")+" "+(f.time||""));
    h+=reviewRow("Turno",f.shift);
    h+=reviewRow("Sector",f.sector);
    if(f.location) h+=reviewRow("Lugar",f.location);
    if(f.eventCategory==="ACCIDENTE" && f.consequence) {
      var cLabel=f.consequence; var found=cat.consequences.find(function(c){return c.value===f.consequence;});
      if(found) cLabel=found.label;
      h+=reviewRow("Consecuencia",cLabel);
    }
    if(f.person) h+=reviewRow("Persona",f.person + (f.personId?" (Leg. "+f.personId+")":""));
    if(f.bodyPart&&f.bodyPart.length) h+=reviewRow("Parte del cuerpo",f.bodyPart.join(", "));
    if(f.epp&&f.epp.length) h+=reviewRow("EPP",f.epp.join(", "));
    if(f.accidentType) { var at=cat.accidentTypes?cat.accidentTypes.find(function(a){return a.id===f.accidentType;}):null; if(at) h+=reviewRow("Tipo accidente",at.icon+" "+at.label); }
    if(f.incidentOption) h+=reviewRow(f.eventSubType==="Acto inseguro"?"Acto inseguro":"Condición insegura",f.incidentOption);
    if(f.areaNotified) h+=reviewRow("Notif. responsable",f.areaNotified+(f.areaNotifiedTo?" — "+f.areaNotifiedTo:""));
    if(f.artNotified) h+=reviewRow("Notif. ART/Seguro",f.artNotified);
    if(f.substance) h+=reviewRow("Sustancia",f.substance);
    if(f.estimatedVolume) h+=reviewRow("Volumen",f.estimatedVolume);
    if(f.areaAffected) h+=reviewRow("Área afectada",f.areaAffected);
    if(f.authorityNotified) h+=reviewRow("Notif. autoridad",f.authorityNotified);
    h+='</div>';
    
    if(f.description) h+='<div class="detail-box"><div class="dt-label">DESCRIPCIÓN</div><div class="dt-value">'+f.description+'</div></div>';
    if(f.immediateActions) h+='<div class="detail-box orange"><div class="dt-label">'+(f.eventCategory==="ACCIDENTE"?"ACCIÓN PARA PROTEGER A LOS DEMÁS":"ACCIONES INMEDIATAS")+'</div><div class="dt-value">'+f.immediateActions+'</div></div>';
    if(f.containmentActions) h+='<div class="detail-box"><div class="dt-label">CONTENCIÓN</div><div class="dt-value">'+f.containmentActions+'</div></div>';
    if(f.corrActions) h+='<div class="detail-box"><div class="dt-label">ACCIONES CORRECTIVAS</div><div class="dt-value">'+f.corrActions+'</div></div>';
    
    h+='<div class="field"><label>Reportado por <span class="req">*</span></label><input type="text" value="'+(f.reportedBy||"")+'" placeholder="Tu nombre" onchange="setField(\'reportedBy\',this.value)"></div>';
    h+='<div class="field"><label>Cargo / Rol</label><input type="text" value="'+(f.reporterRole||"")+'" placeholder="Ej: Supervisor de turno" onchange="setField(\'reporterRole\',this.value)"></div>';
    return h;
  }
  
  return "";
}

function reviewRow(label,value) {
  if(!value) return "";
  return '<div class="review-row"><span class="review-label">'+label+'</span><span class="review-value">'+value+'</span></div>';
}

// Datalists de personal (se insertan una sola vez al body)
function initDatalists() {
  if (typeof PERSONAL === "undefined" || !PERSONAL.length) return;
  if (document.getElementById("dlPersonas")) return;
  var html = '<datalist id="dlPersonas">';
  PERSONAL.forEach(function(p){ html += '<option value="'+p.nombre+'">'; });
  html += '</datalist><datalist id="dlLegajos">';
  PERSONAL.forEach(function(p){ html += '<option value="'+p.legajo+'">'+p.nombre+'</option>'; });
  html += '</datalist>';
  document.body.insertAdjacentHTML("beforeend", html);
}

// Init
initDatalists();
render();
</script>
</body>
</html>
