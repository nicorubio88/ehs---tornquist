<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Evento — EHS Tornquist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-50:#ECFDF5; --brand-100:#D1FAE5; --brand-200:#A7F3D0;
    --brand-400:#34D399; --brand-500:#10B981; --brand-600:#059669;
    --brand-700:#047857; --brand-800:#065F46; --brand-900:#064E3B;
    --ink-50:#F8FAFC; --ink-100:#F1F5F9; --ink-200:#E2E8F0;
    --ink-400:#94A3B8; --ink-500:#64748B; --ink-700:#334155;
    --ink-800:#1E293B; --ink-900:#0F172A;
    --observation:#1E40AF; --conversation:#0F766E; --incident:#B45309;
    --accident:#B91C1C; --environment:#15803D;
    --shadow-sm:0 1px 2px rgba(15,23,42,.06);
    --shadow-md:0 4px 12px rgba(15,23,42,.08);
    --shadow-lg:0 20px 40px rgba(4,120,87,.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter Tight',system-ui,sans-serif;
    background:var(--ink-50); color:var(--ink-800);
    min-height:100vh; letter-spacing:-.01em; padding:0;
  }
  .topbar {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 20px; border-bottom:1px solid var(--ink-200);
    background:#fff; position:sticky; top:0; z-index:10;
  }
  .topbar-back { font-size:13px; color:var(--ink-500); text-decoration:none; }
  .topbar-back:hover { color:var(--ink-800); }
  .topbar-title { font-size:14px; font-weight:600; color:var(--ink-900); }
  .container { max-width:680px; margin:0 auto; padding:20px 16px 80px; }

  .progress {
    display:flex; gap:6px; margin-bottom:24px;
  }
  .progress-step {
    flex:1; height:4px; background:var(--ink-200); border-radius:2px; transition:all .3s;
  }
  .progress-step.active { background:var(--brand-600); }
  .progress-step.done { background:var(--brand-400); }

  .step-label {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    color:var(--ink-500); text-transform:uppercase; letter-spacing:.1em;
    margin-bottom:8px;
  }
  h1 {
    font-size:24px; font-weight:700; color:var(--ink-900);
    margin-bottom:8px; letter-spacing:-.02em;
  }
  .subtitle { color:var(--ink-500); font-size:14px; margin-bottom:24px; }

  .section {
    background:#fff; border:1px solid var(--ink-200); border-radius:14px;
    padding:18px; margin-bottom:14px; box-shadow:var(--shadow-sm);
  }
  .section-title {
    font-size:15px; font-weight:700; margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .field { margin-bottom:14px; }
  .field:last-child { margin-bottom:0; }
  .field label {
    display:block; font-size:12px; font-weight:600; color:var(--ink-700);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;
  }
  .req { color:var(--accident); margin-left:2px; }
  .field input, .field textarea, .field select {
    width:100%; padding:10px 12px; border:1px solid var(--ink-200);
    border-radius:8px; font:inherit; font-size:14px; color:var(--ink-900);
    background:#fff; transition:all .15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline:none; border-color:var(--brand-500);
    box-shadow:0 0 0 3px var(--brand-100);
  }
  .field textarea { resize:vertical; min-height:80px; line-height:1.5; }
  .field-hint { font-size:11px; color:var(--ink-400); margin-top:4px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:520px) { .field-row { grid-template-columns:1fr; } }

  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip {
    padding:9px 14px; border:1.5px solid var(--ink-200); border-radius:999px;
    background:#fff; font-size:13px; font-weight:500; color:var(--ink-700);
    cursor:pointer; transition:all .15s;
  }
  .chip:hover { border-color:var(--ink-400); }
  .chip.active {
    background:var(--brand-50); border-color:var(--brand-600);
    color:var(--brand-800); font-weight:600;
  }
  .chip.danger.active { background:#FEF2F2; border-color:var(--accident); color:var(--accident); }
  .chip.warn.active { background:#FFFBEB; border-color:var(--incident); color:var(--incident); }

  .type-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .type-card {
    border:1.5px solid var(--ink-200); border-radius:12px;
    padding:14px 12px; cursor:pointer; background:#fff;
    transition:all .15s; text-align:left;
  }
  .type-card:hover { transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .type-card.active { border-width:2px; padding:13px 11px; }
  .type-card.active.observation { border-color:var(--observation); background:#EFF6FF; }
  .type-card.active.conversation { border-color:var(--conversation); background:#F0FDFA; }
  .type-card.active.incident { border-color:var(--incident); background:#FFFBEB; }
  .type-card.active.accident { border-color:var(--accident); background:#FEF2F2; }
  .type-card.active.environment { border-color:var(--environment); background:#F0FDF4; }
  .type-icon {
    font-size:24px; margin-bottom:6px; display:block;
  }
  .type-name { font-size:13px; font-weight:700; color:var(--ink-900); margin-bottom:2px; }
  .type-desc { font-size:11px; color:var(--ink-500); line-height:1.3; }

  .nav-buttons {
    display:flex; gap:10px; margin-top:20px; padding-top:14px;
    border-top:1px solid var(--ink-200);
  }
  .btn {
    flex:1; padding:12px 18px; border-radius:10px; border:none;
    font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
    transition:all .15s;
  }
  .btn-prev { background:#fff; color:var(--ink-700); border:1.5px solid var(--ink-200); }
  .btn-prev:hover { border-color:var(--ink-400); }
  .btn-next, .btn-submit {
    background:var(--brand-600); color:#fff;
  }
  .btn-next:hover, .btn-submit:hover { background:var(--brand-700); }
  .btn-next:disabled, .btn-submit:disabled {
    background:var(--ink-200); cursor:not-allowed;
  }

  .review-row {
    display:flex; padding:8px 0; border-bottom:1px solid var(--ink-100);
    font-size:13px;
  }
  .review-row:last-child { border-bottom:none; }
  .review-label {
    flex:0 0 40%; font-weight:600; color:var(--ink-500);
    text-transform:uppercase; font-size:11px; letter-spacing:.04em;
  }
  .review-value { flex:1; color:var(--ink-900); }

  .loading-overlay {
    position:fixed; inset:0; background:rgba(255,255,255,.95);
    display:flex; align-items:center; justify-content:center;
    z-index:100; flex-direction:column; gap:14px;
  }
  .spinner {
    width:40px; height:40px; border:3px solid var(--ink-200);
    border-top-color:var(--brand-600); border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .success-screen {
    text-align:center; padding:40px 20px;
  }
  .success-icon {
    width:64px; height:64px; border-radius:50%;
    background:var(--brand-100); color:var(--brand-700);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 16px; font-size:32px;
  }
  .success-screen h2 { font-size:20px; margin-bottom:8px; }
  .success-screen p { color:var(--ink-500); margin-bottom:20px; }
  .success-id {
    display:inline-block; font-family:'JetBrains Mono',monospace;
    font-size:13px; padding:6px 12px; background:var(--ink-100);
    border-radius:6px; margin-bottom:20px;
  }

  .error-banner {
    background:#FEF2F2; border:1px solid #FECACA; color:#991B1B;
    padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px;
  }

  /* Banner inspiracional no-punitivo */
  .culture-banner {
    background:linear-gradient(135deg, var(--brand-50) 0%, #ECFDF5 100%);
    border:1px solid var(--brand-200); border-radius:12px;
    padding:14px 18px; margin-bottom:16px;
    display:flex; align-items:center; gap:14px;
  }
  .culture-banner-icon {
    width:36px; height:36px; flex:0 0 36px;
    border-radius:50%; background:var(--brand-600);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:18px;
  }
  .culture-banner-text {
    font-size:13px; line-height:1.45; color:var(--brand-900);
    font-weight:500;
  }
  .culture-banner-text strong { color:var(--brand-700); font-weight:700; }
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="topbar-back">← Inicio</a>
  <span class="topbar-title">Registrar Evento</span>
  <span style="width:50px;"></span>
</div>

<div class="container" id="app">
  <div style="text-align:center;padding:40px 20px;">
    <div class="spinner" style="margin:0 auto 14px;"></div>
    <p style="color:var(--ink-500);font-size:13px;">Cargando datos maestros...</p>
  </div>
</div>

<script>
// =============================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMoQM2DkE0FNwWKQwfJNluPqc0pg2TKv6MQs0tYUFpRSb3fk8E6vxtePJ0SKs0mkY/exec";
// =============================================

// =============================================
// 💚 MENSAJE DE CULTURA (no punitivo) — EDITAR ACÁ
// Aparece en el formulario al elegir Observación o Conversación.
// Refuerza la cultura BBS de reporte sin culpa.
var CULTURE_MESSAGE = "Cada observación que cargás cuida a un compañero. Este sistema es para <strong>aprender y mejorar</strong>, no para sancionar.";
// =============================================

// Subtipos válidos por tipo
var SUBTIPOS = {
  "OBSERVACION":  ["Acto inseguro", "Condición insegura"],
  "CONVERSACION": ["Refuerzo positivo", "Coaching correctivo", "Charla de seguridad"],
  "INCIDENTE":    ["Casi accidente / cuasi accidente", "Daño material", "Falla equipo con riesgo"],
  "ACCIDENTE":    ["Lesión leve sin baja", "Lesión leve con baja", "Lesión grave", "Fatal"],
  "AMBIENTE":     ["Derrame", "Fuga gas/vapor", "Emisión no controlada", "Residuo mal gestionado", "Ruido fuera de norma"]
};

var TIPO_META = {
  "OBSERVACION":  { icon:"👁", label:"Observación", desc:"Acto/condición insegura, casi accidente", className:"observation" },
  "CONVERSACION": { icon:"💬", label:"Conversación", desc:"Diálogo de seguridad", className:"conversation" },
  "INCIDENTE":    { icon:"⚠️", label:"Incidente", desc:"Daño material, cuasi accidente", className:"incident" },
  "ACCIDENTE":    { icon:"🔴", label:"Accidente", desc:"Lesión a persona", className:"accident" },
  "AMBIENTE":     { icon:"🌿", label:"Medio Ambiente", desc:"Derrame, fuga, emisión", className:"environment" }
};

var TURNOS = ["A","B","C","D","Diurno"];
var BODY_PARTS = ["Cabeza","Ojos","Cara","Cuello","Hombro","Brazo","Mano","Dedos","Tronco","Espalda","Cadera","Pierna","Rodilla","Pie","Múltiples"];
var TIPO_LESION = ["Corte","Golpe","Quemadura","Aplastamiento","Esguince","Fractura","Atrapamiento","Caída","Proyección","Eléctrico","Químico","Otro"];
var MEDIOS = ["Suelo","Agua","Aire","Múltiple"];
var UNIDADES = ["L","kg","m³","ppm","unidades"];

// Estado global
var MAESTROS = { personal:[], sectores:[], responsables:[], sustancias:[] };
var PERSONAL_BY_LEGAJO = {};
var PERSONAL_BY_NOMBRE = {};

var state = {
  step: 0,
  totalSteps: 5,
  form: {
    tipo:"", subtipo:"",
    fecha_evento:"", hora_evento:"", sector:"", turno:"",
    reportado_por_legajo:"", reportado_por_nombre:"",
    persona_legajo:"", persona_nombre:"",
    descripcion:"", prioridad:"",
    // Específicos
    obs_tipo_acto_condicion:"", obs_accion_inmediata:"",
    obs_hablo_persona:"", obs_causa_acto:"", obs_estado_observado:"",
    obs_genera_ot:"", obs_parada_equipo:"", obs_tipo_riesgo:"",
    conv_tema:"", conv_compromiso:"",
    conv_refuerzo_positivo:"", conv_propuesta_propia:"",
    inc_equipo_afectado:"", inc_dano_estimado_ars:"", inc_accion_inmediata:"",
    inc_notif_responsable:"", inc_notif_a_quien:"",
    inc_estado_mental:"", inc_error_critico:"",
    acc_parte_cuerpo:"", acc_tipo_lesion:"", acc_mecanismo:"",
    acc_testigo1_legajo:"", acc_testigo2_legajo:"",
    acc_notif_art:"", acc_hora_notif_art:"", acc_dias_baja_estimados:"",
    acc_accion_inmediata:"", acc_notif_responsable:"", acc_notif_a_quien:"",
    acc_estado_mental:"", acc_error_critico:"",
    amb_sustancia:"", amb_cantidad:"", amb_unidad:"",
    amb_medio_impactado:"", amb_contencion_aplicada:"", amb_notif_autoridad:"",
    amb_fuente:"", amb_llego_pluvial:""
  },
  saving: false,
  saved: null,
  error: null
};

// =============================================
// CARGA INICIAL DE MAESTROS
// =============================================
// =============================================
// HELPERS
// =============================================
// Escapa HTML para prevenir XSS al inyectar texto del usuario en innerHTML
function escapeHTML(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function loadMaestros() {
  fetch(APPS_SCRIPT_URL + "?tipo=maestros")
    .then(function(r){ return r.json(); })
    .then(function(data){
      MAESTROS = data || MAESTROS;
      // Construir índices
      (MAESTROS.personal || []).forEach(function(p){
        if (p.legajo) PERSONAL_BY_LEGAJO[String(p.legajo)] = p.nombre;
        if (p.nombre) PERSONAL_BY_NOMBRE[String(p.nombre).toUpperCase()] = p.legajo;
      });
      // Pre-llenar fecha y hora con valores actuales
      var now = new Date();
      state.form.fecha_evento = now.toISOString().substring(0,10);
      state.form.hora_evento = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
      injectDatalists();
      render();
    })
    .catch(function(err){
      document.getElementById("app").innerHTML =
        '<div class="error-banner">No pude cargar los datos maestros desde el servidor. Reintentá en unos segundos. Detalle: '+err.message+'</div>'+
        '<button class="btn btn-next" onclick="loadMaestros()">Reintentar</button>';
    });
}

function injectDatalists() {
  if (document.getElementById("dlPersonas")) return;
  var html = '<datalist id="dlPersonas">';
  (MAESTROS.personal||[]).forEach(function(p){
    if (p.nombre) html += '<option value="'+p.nombre+'">';
  });
  html += '</datalist><datalist id="dlLegajos">';
  (MAESTROS.personal||[]).forEach(function(p){
    if (p.legajo) html += '<option value="'+p.legajo+'">'+(p.nombre||"")+'</option>';
  });
  html += '</datalist>';
  document.body.insertAdjacentHTML("beforeend", html);
}

// =============================================
// HELPERS
// =============================================
function setField(field, value) { state.form[field] = value; render(); }
function setType(tipo) {
  state.form.tipo = tipo;
  state.form.subtipo = ""; // reset subtipo al cambiar tipo
  render();
}
function setSubtipo(sub) { state.form.subtipo = sub; render(); }

function onPersonaChange(field, v) {
  state.form[field] = v;
  // Auto-fill complementario
  var key = String(v||"").trim().toUpperCase();
  if (PERSONAL_BY_NOMBRE[key]) {
    var legajoField = field.replace("nombre","legajo");
    if (state.form.hasOwnProperty(legajoField)) state.form[legajoField] = String(PERSONAL_BY_NOMBRE[key]);
  }
  render();
}
function onLegajoChange(field, v) {
  state.form[field] = v;
  var key = String(v||"").trim();
  if (PERSONAL_BY_LEGAJO[key]) {
    var nombreField = field.replace("legajo","nombre");
    if (state.form.hasOwnProperty(nombreField)) state.form[nombreField] = PERSONAL_BY_LEGAJO[key];
  }
  render();
}

function canNext() {
  var s = state.step, f = state.form;
  if (s === 0) return !!f.tipo && !!f.subtipo;
  if (s === 1) return !!f.fecha_evento && !!f.hora_evento && !!f.sector && !!f.turno && !!f.prioridad;
  if (s === 2) return !!f.reportado_por_legajo && !!f.reportado_por_nombre;
  if (s === 3) return !!(f.descripcion && f.descripcion.trim().length >= 10);
  return true;
}

function nextStep() { if (canNext()) { state.step++; render(); window.scrollTo(0,0); } }
function prevStep() { if (state.step > 0) { state.step--; render(); window.scrollTo(0,0); } }

// =============================================
// RENDER
// =============================================
function render() {
  if (state.saved) return renderSuccess();
  var html = '';
  // Progress bar
  html += '<div class="progress">';
  for (var i=0; i<state.totalSteps; i++) {
    var cls = '';
    if (i < state.step) cls = 'done';
    else if (i === state.step) cls = 'active';
    html += '<div class="progress-step '+cls+'"></div>';
  }
  html += '</div>';
  html += '<div class="step-label">Paso '+(state.step+1)+' de '+state.totalSteps+'</div>';

  if (state.error) html += '<div class="error-banner">'+state.error+'</div>';

  if (state.step === 0) html += renderStep0();
  else if (state.step === 1) html += renderStep1();
  else if (state.step === 2) html += renderStep2();
  else if (state.step === 3) html += renderStep3();
  else if (state.step === 4) html += renderReview();

  // Nav buttons
  html += '<div class="nav-buttons">';
  if (state.step > 0) html += '<button class="btn btn-prev" onclick="prevStep()">← Anterior</button>';
  if (state.step < state.totalSteps - 1) {
    html += '<button class="btn btn-next" onclick="nextStep()" '+(canNext()?"":"disabled")+'>Siguiente →</button>';
  } else {
    html += '<button class="btn btn-submit" onclick="submitForm()" '+(state.saving?"disabled":"")+'>'+(state.saving?"Enviando...":"✓ Enviar registro")+'</button>';
  }
  html += '</div>';

  document.getElementById("app").innerHTML = html;
}

// PASO 0: Tipo y subtipo
function renderStep0() {
  var f = state.form;
  var html = '<h1>¿Qué tipo de evento querés registrar?</h1>';
  html += '<p class="subtitle">Elegí el tipo y luego el subtipo correspondiente.</p>';

  html += '<div class="section"><div class="section-title">Tipo de evento</div>';
  html += '<div class="type-grid">';
  Object.keys(TIPO_META).forEach(function(tipo){
    var meta = TIPO_META[tipo];
    var active = f.tipo === tipo ? 'active '+meta.className : '';
    html += '<div class="type-card '+active+'" onclick="setType(\''+tipo+'\')">'
      + '<span class="type-icon">'+meta.icon+'</span>'
      + '<div class="type-name">'+meta.label+'</div>'
      + '<div class="type-desc">'+meta.desc+'</div>'
      + '</div>';
  });
  html += '</div></div>';

  if (f.tipo) {
    // Banner inspiracional para Observación y Conversación
    if (f.tipo === "OBSERVACION" || f.tipo === "CONVERSACION") {
      html += '<div class="culture-banner">'
        + '<div class="culture-banner-icon">💚</div>'
        + '<div class="culture-banner-text">'+CULTURE_MESSAGE+'</div>'
        + '</div>';
    }
    html += '<div class="section"><div class="section-title">Subtipo</div>';
    html += '<div class="chips">';
    SUBTIPOS[f.tipo].forEach(function(s){
      var cls = (f.subtipo===s) ? 'chip active' : 'chip';
      html += '<div class="'+cls+'" onclick="setSubtipo(\''+s+'\')">'+s+'</div>';
    });
    html += '</div></div>';
  }
  return html;
}

// PASO 1: Cuándo, dónde y prioridad
function renderStep1() {
  var f = state.form;
  var html = '<h1>¿Cuándo y dónde ocurrió?</h1>';
  html += '<p class="subtitle">Datos básicos del evento.</p>';

  html += '<div class="section"><div class="section-title">📅 Fecha y hora</div>';
  html += '<div class="field-row">';
  html += '<div class="field"><label>Fecha <span class="req">*</span></label><input type="date" value="'+f.fecha_evento+'" onchange="setField(\'fecha_evento\',this.value)"></div>';
  html += '<div class="field"><label>Hora <span class="req">*</span></label><input type="time" value="'+f.hora_evento+'" onchange="setField(\'hora_evento\',this.value)"></div>';
  html += '</div></div>';

  html += '<div class="section"><div class="section-title">📍 Ubicación</div>';
  html += '<div class="field"><label>Sector <span class="req">*</span></label>';
  html += '<select onchange="setField(\'sector\',this.value)"><option value="">— Elegir sector —</option>';
  (MAESTROS.sectores||[]).forEach(function(s){
    var sel = (f.sector===s.nombre)?' selected':'';
    html += '<option value="'+s.nombre+'"'+sel+'>'+s.nombre+'</option>';
  });
  html += '</select></div>';
  html += '<div class="field"><label>Turno <span class="req">*</span></label><div class="chips">';
  TURNOS.forEach(function(t){
    var cls = (f.turno===t)?'chip active':'chip';
    html += '<div class="'+cls+'" onclick="setField(\'turno\',\''+t+'\')">'+t+'</div>';
  });
  html += '</div></div></div>';

  html += '<div class="section"><div class="section-title">🚦 Prioridad</div>';
  html += '<div class="chips">';
  ["Alta","Media","Baja"].forEach(function(p){
    var clsBase = 'chip';
    if (p==="Alta") clsBase += ' danger';
    else if (p==="Media") clsBase += ' warn';

    if (f.inc_equipo_afectado) html += reviewRow("Equipo", f.inc_equipo_afectado);
    if (f.inc_dano_estimado_ars) html += reviewRow("Daño estimado", '$'+f.inc_dano_estimado_ars);
    if (f.inc_accion_inmediata) html += reviewRow("Acción inmediata", f.inc_accion_inmediata);
    if (f.inc_notif_responsable) html += reviewRow("Notif. responsable", f.inc_notif_responsable + (f.inc_notif_a_quien?' — '+f.inc_notif_a_quien:''));
    if (f.inc_estado_mental) html += reviewRow("Estado mental (SafeStart)", f.inc_estado_mental);
    if (f.inc_error_critico) html += reviewRow("Error crítico (SafeStart)", f.inc_error_critico);
    html += '</div>';
  }
  if (f.tipo === "ACCIDENTE") {
    html += '<div class="section">';
    if (f.acc_parte_cuerpo) html += reviewRow("Parte del cuerpo", f.acc_parte_cuerpo);
    if (f.acc_tipo_lesion) html += reviewRow("Tipo de lesión", f.acc_tipo_lesion);
    if (f.acc_mecanismo) html += reviewRow("Mecanismo", f.acc_mecanismo);
    if (f.acc_testigo1_legajo) html += reviewRow("Testigo 1", f.acc_testigo1_legajo);
    if (f.acc_testigo2_legajo) html += reviewRow("Testigo 2", f.acc_testigo2_legajo);
    if (f.acc_dias_baja_estimados) html += reviewRow("Días de baja", f.acc_dias_baja_estimados);
    if (f.acc_accion_inmediata) html += reviewRow("Acción inmediata", f.acc_accion_inmediata);
    if (f.acc_notif_art) html += reviewRow("Notif. ART", f.acc_notif_art + (f.acc_hora_notif_art?' a las '+f.acc_hora_notif_art:''));
    if (f.acc_estado_mental) html += reviewRow("Estado mental previo (SafeStart)", f.acc_estado_mental);
    if (f.acc_error_critico) html += reviewRow("Error crítico (SafeStart)", f.acc_error_critico);
    html += '</div>';
  }
  if (f.tipo === "AMBIENTE") {
    html += '<div class="section">';
    if (f.amb_sustancia) html += reviewRow("Sustancia", f.amb_sustancia);
    if (f.amb_cantidad) html += reviewRow("Cantidad", f.amb_cantidad+' '+(f.amb_unidad||''));
    if (f.amb_fuente) html += reviewRow("Fuente", f.amb_fuente);
    if (f.amb_medio_impactado) html += reviewRow("Medio impactado", f.amb_medio_impactado);
    if (f.amb_llego_pluvial) html += reviewRow("Llegó a pluvial/cuerpo de agua", f.amb_llego_pluvial);
    if (f.amb_contencion_aplicada) html += reviewRow("Contención", f.amb_contencion_aplicada);
    if (f.amb_notif_autoridad) html += reviewRow("Notif. autoridad", f.amb_notif_autoridad);
    html += '</div>';
  }

  return html;
}

function reviewRow(label, value) {
  if (!value || value === "undefined") return "";
  return '<div class="review-row"><span class="review-label">'+escapeHTML(label)+'</span><span class="review-value">'+escapeHTML(value)+'</span></div>';
}

function renderSuccess() {
  var html = '<div class="success-screen">'
    + '<div class="success-icon">✓</div>'
    + '<h2>Evento registrado</h2>'
    + '<p>El registro se guardó correctamente y se envió la notificación por email.</p>'
    + '<div class="success-id">ID: '+state.saved+'</div>'
    + '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'
    + '<a href="formulario_v2.html" class="btn btn-next" style="text-decoration:none;display:inline-block;flex:0 0 auto;">+ Cargar otro evento</a>'
    + '<a href="dashboard_v2.html" class="btn btn-prev" style="text-decoration:none;display:inline-block;flex:0 0 auto;">Ver dashboard</a>'
    + '</div></div>';
  document.getElementById("app").innerHTML = html;
}

// =============================================
// SUBMIT
// =============================================
function submitForm() {
  state.saving = true;
  state.error = null;
  render();

  var params = new URLSearchParams();
  params.append("action","save_evento");
  Object.keys(state.form).forEach(function(k){
    if (state.form[k] !== "" && state.form[k] !== null && state.form[k] !== undefined) {
      params.append(k, state.form[k]);
    }
  });

  fetch(APPS_SCRIPT_URL, { method:"POST", body: params })
    .then(function(r){ return r.json(); })
    .then(function(resp){
      if (resp.ok) {
        state.saved = resp.evento_id;
        state.saving = false;
        renderSuccess();
      } else {
        state.error = "Error al guardar: " + (resp.error || "desconocido");
        state.saving = false;
        render();
      }
    })
    .catch(function(err){
      state.error = "Error de red: " + err.message;
      state.saving = false;
      render();
    });
}

// Init
loadMaestros();
</script>
